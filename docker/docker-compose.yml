name: cryptomania

services:
  app:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: cryptomania-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_PROTOCOL: http
      APP_TIMEZONE: Europe/Moscow
      APP_URL: http://localhost:8081
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: cryptomania
      DB_USERNAME: cryptomania
      DB_PASSWORD: cryptomania
      BROADCAST_DRIVER: log
      CACHE_DRIVER: file
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      QUEUE_DRIVER: sync
      REDIS_HOST: redis
      MAIL_MAILER: log
      MAIL_DRIVER: log
    ports:
      - "8081:80"
    volumes:
      - ..:/var/www/html
      - composer-cache:/tmp/composer-cache
    networks:
      - cryptomania

  mysql:
    image: mysql:8.4
    container_name: cryptomania-mysql
    environment:
      MYSQL_DATABASE: cryptomania
      MYSQL_USER: cryptomania
      MYSQL_PASSWORD: cryptomania
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33060:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - cryptomania

volumes:
  mysql-data:
  composer-cache:

networks:
  cryptomania:
    driver: bridge
